name: 29915_test

on:
  push:
    branches: [ main ] # only on pushing into branch MAIN

jobs:

  check-tests:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check if tests exist # checking if test exists
        run: |
          if [ ! -f test_main.py ]; then
            echo "test_main.py NOT FOUND" > napaka.txt
            exit 1
          else
            > napaka.txt
          fi

      - name: Upload artifact # uploading napaka.txt
        uses: actions/upload-artifact@v4
        with:
          name: napaka
          path: napaka.txt


  run-tests:
    needs: check-tests
    runs-on: self-hosted

    strategy:
      matrix:
        python-version: [3.11, 3.12] # using matrix for testing in different matrix versions. can be accessed by ${{ matrix.python-version }} (in theory)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4 # downloading napaka from last check
        with:
          name: napaka

      - name: Check error file
        run: |
          if [ -s napaka.txt ]; then
            echo "ERROR: tests missing or broken"
            cat napaka.txt
            exit 1
          fi

      - name: Create venv # venv through system python3
        run: |
          echo "creating venv by ${{ matrix.python-version }}"
          python3 -m venv venv

      - name: Install dependencies
        run: |
          source venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: |
          source venv/bin/activate
          python -m pytest -v
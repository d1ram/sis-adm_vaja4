name: 29915_test

on:
  push:
    branches: [ main ]

jobs:

  check-tests:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check if tests exist
        run: |
          if [ ! -f test_main.py ]; then
            echo "test_main.py NOT FOUND" > napaka.txt
            exit 1
          else
            echo "" > napaka.txt
          fi

      - name: Upload artifact (napaka)
        uses: actions/upload-artifact@v4
        with:
          name: napaka
          path: napaka.txt

  run-tests:
    needs: check-tests
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: napaka

      - name: Debug napaka
        run: cat napaka.txt

      - name: Check error file
        run: |
          if [ -s napaka.txt ]; then
            echo "ERROR: tests missing or broken"
            cat napaka.txt
            exit 1
          fi

      - name: Install dependencies
        run: |
          python3 -m pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest -v
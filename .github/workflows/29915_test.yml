name: 29915_test

on:
  push:
    branches: [ main ]

jobs:

  check-tests:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Проверка наличия тестов
      - name: Check if tests exist
        run: |
          if [ ! -f test_main.py ]; then
            echo "test_main.py NOT FOUND" > napaka.txt
            exit 1
          else
            > napaka.txt
          fi

      # Сохраняем результат проверки
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: napaka
          path: napaka.txt


  run-tests:
    needs: check-tests
    runs-on: self-hosted

    strategy:
      matrix:
        python-version: [3.10, 3.11]   # просто логика матрицы

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: napaka

      - name: Check error file
        run: |
          if [ -s napaka.txt ]; then
            echo "ERROR: tests missing or broken"
            cat napaka.txt
            exit 1
          fi

      # venv через системный python3
      - name: Create venv
        run: |
          python3 -m venv venv

      - name: Install dependencies
        run: |
          source venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: |
          source venv/bin/activate
          python -m pytest -v
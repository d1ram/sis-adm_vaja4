name: 29915_deploy

on:
  workflow_run:
    workflows: ["29915_test"]
    types:
      - completed

jobs:

  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name : Login Dockerhub
        run : echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name : Build Image
        run : docker build -t ${{ secrets.DOCKER_USERNAME }}/vaja4:latest .

      - name : Push Image
        run : docker push ${{ secrets.DOCKER_USERNAME }}/vaja4:latest